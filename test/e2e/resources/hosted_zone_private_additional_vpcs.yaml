apiVersion: route53.services.k8s.aws/v1alpha1
kind: HostedZone
metadata:
  name: $ZONE_NAME
spec:
  name: $ZONE_DOMAIN
  vpc:
    vpcID: $VPC_ID
    vpcRegion: $AWS_REGION
  additionalVPCs:
    - vpcID: $ADDITIONAL_VPC_ID
      vpcRegion: $AWS_REGION
    - vpcID: $ADDITIONAL_VPC_ID_2
      vpcRegion: $AWS_REGION
