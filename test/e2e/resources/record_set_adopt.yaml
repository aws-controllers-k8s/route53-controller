apiVersion: route53.services.k8s.aws/v1alpha1
kind: RecordSet
metadata:
  name: $ADOPT_RECORD_NAME
  annotations:
    services.k8s.aws/adoption-policy: adopt-or-create
spec:
  name: $ADOPT_RECORD_DNS_NAME
  hostedZoneID: $HOSTED_ZONE_ID
  recordType: A
  resourceRecords:
  - value: $IP_ADDR
  ttl: 300
